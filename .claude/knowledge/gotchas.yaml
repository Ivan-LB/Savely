# gotchas.yaml — append-only log of project invariants
#
# Schema:
#   - id:           kebab-case unique identifier
#     summary:      one-line statement of the rule
#     why:          the underlying reason (what breaks if you ignore this)
#     how-to-apply: when/where this rule kicks in
#
# Discovered during the initial scaffold (2026-04-24):

- id: only-savely-scheme-is-shared
  summary: xcodebuild must use -scheme Savely; SavelyTests/SavelyUITests schemes are not shared.
  why: Only Savely.xcscheme exists in xcshareddata. -scheme SavelyTests fails on a fresh checkout. The Savely scheme's Test action runs both bundles together.
  how-to-apply: Any time you write or copy an xcodebuild command — for CI, for local docs, for agent prompts.

- id: deployment-target-floor-ios-26
  summary: iOS 26.0 is the minimum deployment target for the Savely app target.
  why: User explicitly chose this to use modern APIs (@Observable, NavigationStack, Swift Testing, Observation framework). Project default is currently 17.0 and tests are 17.5 — those are out of sync and will be aligned by build-ci-specialist.
  how-to-apply: Free to use iOS 26 APIs. Don't add #available(iOS 17, *) checks. Don't fall back to ObservableObject for new view models.

- id: secrets-are-gitignored
  summary: Savely/Config.plist and Savely/GoogleService-Info.plist contain secrets and must never be committed.
  why: They hold the OpenAI API key and Firebase config respectively. Leaking them on a public repo means key rotation + potential abuse charges.
  how-to-apply: Before any commit, grep the staged diff for these paths. If present, stop and tell the user.

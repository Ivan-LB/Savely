# gotchas.yaml — append-only log of project invariants
#
# Schema:
#   - id:           kebab-case unique identifier
#     summary:      one-line statement of the rule
#     why:          the underlying reason (what breaks if you ignore this)
#     how-to-apply: when/where this rule kicks in
#
# Discovered during the initial scaffold (2026-04-24):

- id: only-savely-scheme-is-shared
  summary: xcodebuild must use -scheme Savely; SavelyTests/SavelyUITests schemes are not shared.
  why: Only Savely.xcscheme exists in xcshareddata. -scheme SavelyTests fails on a fresh checkout. The Savely scheme's Test action runs both bundles together.
  how-to-apply: Any time you write or copy an xcodebuild command — for CI, for local docs, for agent prompts.

- id: deployment-target-floor-ios-26
  summary: iOS 26.0 is the minimum deployment target across all targets and the project default.
  why: User explicitly chose this to use modern APIs (@Observable, NavigationStack, Swift Testing, Observation framework). All six IPHONEOS_DEPLOYMENT_TARGET values in project.pbxproj are now 26.0; UI test targets inherit it from the project default.
  how-to-apply: Free to use iOS 26 APIs. Don't add #available(iOS 17, *) checks. Don't fall back to ObservableObject for new view models. If you ever bump the project default, bump every per-target override too — mismatches break @testable import with "minimum deployment target" errors.

- id: secrets-are-gitignored
  summary: Savely/Config.plist and Savely/GoogleService-Info.plist contain secrets and must never be committed.
  why: They hold the OpenAI API key and Firebase config respectively. Leaking them on a public repo means key rotation + potential abuse charges.
  how-to-apply: Before any commit, grep the staged diff for these paths. If present, stop and tell the user.

- id: ci-needs-placeholder-config-plist
  summary: CI must generate a placeholder Config.plist before xcodebuild because the Xcode project lists it as a required build input.
  why: Config.plist is gitignored, so a fresh checkout (incl. CI runners) does not have it. xcodebuild fails with "Build input file cannot be found" before compilation even starts. The OpenAI key itself is not needed — CI never makes the network call — only the file with the right shape.
  how-to-apply: In .github/workflows/ci.yml, write a minimal plist with the OPENAI_API_KEY field before the Resolve SPM / Build steps. If GoogleService-Info.plist later stops being tracked, apply the same pattern (and use a real Firebase config from a GitHub secret if you ever need a working Firebase build on CI).

version: 2

updates:
  # Swift Package Manager dependencies
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Mexico_City"
    open-pull-requests-limit: 5
    target-branch: "dev"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
    # Group patch + minor bumps so we don't drown in PRs.
    # Major bumps stay as individual PRs (potential breaking changes).
    groups:
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"

  # GitHub Actions versions in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    target-branch: "dev"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "ci"
